app:
  name: "Identificacao de Vacas - Visao Computacional"
  model_name: "yolov8"
  image_size: 640
  confidence_threshold: 0.5
  top_k: 5

paths:
  data_dir: "data"
  models_dir: "models"
  outputs_dir: "outputs"
  raw_dir: "raw"
  unified_dir: "data/unified"
  logs_dir: "outputs/logs"
  statistics_dir: "outputs/statistics"

# Pipeline de dados
data:
  catalogo_subdir: "catalogo"
  classificacao_subdir: "classificacao"
  keypoints_subdir: "Key_points"
  image_size: 640
  # Split 80/10/10 (treino/validação/teste) por pasta em stratified_per_group
  train_ratio: 0.8   # 80% de cada pasta para treino
  val_ratio: 0.1    # 10% de cada pasta para validação (durante o treino)
  test_ratio: 0.1   # 10% de cada pasta para teste (avaliar modelo final)
  split_test_ratio: 0.1
  random_seed: 42

# Validação de pose (reduz vazamento)
pose:
  k_folds: 5
  # stratified_per_group: 80% train, 10% val, 10% test por pasta (sem overlap)
  strategy: "stratified_per_group"  # stratified_per_group | group_kfold | kfold_misturado

# Augmentation (treino) - aplicadas no prepare_dataset (offline) e opcionalmente no YOLO
augmentation:
  enabled: true
  horizontal_flip: 0.5
  vertical_flip: 0.2
  rotate_limit: 15
  brightness_contrast: 0.2
  gaussian_blur: 0.1
  hue_saturation: 0.1
  contrast_limit: 0.25
  gaussian_noise_std: 10.0
  train_augment_copies: 1
  # Mosaic: combina 4 imagens em uma (2x2). Gera o máximo possível a partir do conjunto de treino
  # (uma imagem mosaic a cada 4 imagens; cada imagem de treino entra em exatamente um mosaic).
  mosaic_enabled: true

# Treino YOLO
training:
  device: "0"  # GPU (0, 1, ...) ou "cpu"
  epochs: 200
  batch_size: 16
  # Early stopping: interrompe se a métrica de validação não melhorar em N épocas
  patience: 20
  workers: 4

# Keypoints (ordem do Label Studio)
keypoints:
  names:
    - withers
    - back
    - hook_up
    - hook_down
    - hip
    - tail_head
    - pin_up
    - pin_down
  skeleton: []  # opcional: pares de índices para desenhar esqueleto

# Feature selection (para análise de importância e treino)
feature_selection:
  method: "mutual_info"  # mutual_info, rf_importance, pca
  top_k: 5   # top-k para listagem/EDA
  top_k_for_training: 15  # usar apenas as N melhores features em modelos treinados com features

